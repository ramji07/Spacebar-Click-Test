<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Spacebar test versus CPS test</title>
  <desc id="desc">A split comparison between a keyboard spacebar score and a mouse CPS score.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#051525"/>
      <stop offset=".5" stop-color="#100f2f"/>
      <stop offset="1" stop-color="#280c25"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#00fff5"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b59ff"/>
      <stop offset="1" stop-color="#ff2d78"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <path d="M480 68v404" stroke="rgba(255,255,255,.16)" stroke-width="4"/>
  <rect x="94" y="174" width="304" height="86" rx="18" fill="#071224" stroke="url(#left)" stroke-width="5"/>
  <rect x="126" y="198" width="240" height="38" rx="13" fill="url(#left)"/>
  <text x="246" y="218" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="800">SPACEBAR</text>
  <text x="246" y="334" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="800">6.2</text>
  <text x="246" y="370" text-anchor="middle" fill="#a0a8c0" font-family="Arial, sans-serif" font-size="22" font-weight="700">KEY CPS</text>
  <path d="M654 128c-58 0-98 50-98 124v26c0 54 44 98 98 98h28c54 0 98-44 98-98v-26c0-74-40-124-98-124z" fill="#071224" stroke="url(#right)" stroke-width="5"/>
  <path d="M668 130v90" stroke="#ffffff" stroke-width="4" opacity=".35"/>
  <rect x="647" y="220" width="42" height="66" rx="21" fill="url(#right)"/>
  <text x="668" y="440" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="800">8.4</text>
  <text x="668" y="476" text-anchor="middle" fill="#a0a8c0" font-family="Arial, sans-serif" font-size="22" font-weight="700">MOUSE CPS</text>
  <text x="480" y="106" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="800">VS</text>
</svg>
