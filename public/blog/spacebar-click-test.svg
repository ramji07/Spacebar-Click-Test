<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Spacebar click test explained</title>
  <desc id="desc">A browser-based counter showing keyboard press statistics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041923"/>
      <stop offset=".55" stop-color="#10143a"/>
      <stop offset="1" stop-color="#2b103d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00fff5"/>
      <stop offset=".48" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#9b59ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="146" y="92" width="668" height="356" rx="26" fill="#070b1d" stroke="rgba(255,255,255,.18)" stroke-width="3"/>
  <rect x="146" y="92" width="668" height="58" rx="26" fill="rgba(255,255,255,.08)"/>
  <circle cx="190" cy="121" r="9" fill="#ff2d78"/>
  <circle cx="224" cy="121" r="9" fill="#ffc857"/>
  <circle cx="258" cy="121" r="9" fill="#00ff88"/>
  <text x="480" y="228" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="800">6.8 CPS</text>
  <text x="480" y="274" text-anchor="middle" fill="#a0a8c0" font-family="Arial, sans-serif" font-size="24" font-weight="700">SPACEBAR CLICK TEST</text>
  <rect x="292" y="326" width="376" height="56" rx="16" fill="url(#accent)"/>
  <text x="480" y="363" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="800">128 TOTAL HITS</text>
  <g stroke="url(#accent)" stroke-width="9" stroke-linecap="round" opacity=".75">
    <path d="M110 216h92"/>
    <path d="M758 216h92"/>
    <path d="M110 300h66"/>
    <path d="M784 300h66"/>
  </g>
</svg>
