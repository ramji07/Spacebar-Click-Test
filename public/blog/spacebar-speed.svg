<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Spacebar speed training</title>
  <desc id="desc">A glowing keyboard spacebar with speed lines and timing marks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071629"/>
      <stop offset=".52" stop-color="#151037"/>
      <stop offset="1" stop-color="#2a0a26"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset=".55" stop-color="#9b59ff"/>
      <stop offset="1" stop-color="#ff2d78"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <g opacity=".2" stroke="#ffffff">
    <path d="M0 90h960M0 180h960M0 270h960M0 360h960M0 450h960"/>
    <path d="M120 0v540M240 0v540M360 0v540M480 0v540M600 0v540M720 0v540M840 0v540"/>
  </g>
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M160 172h250" stroke="#00d4ff" stroke-width="16"/>
    <path d="M118 228h340" stroke="#9b59ff" stroke-width="12"/>
    <path d="M204 288h210" stroke="#ff2d78" stroke-width="10"/>
  </g>
  <rect x="190" y="336" width="580" height="86" rx="18" fill="#070b1d" stroke="url(#key)" stroke-width="5"/>
  <rect x="228" y="360" width="504" height="38" rx="14" fill="url(#key)" opacity=".9"/>
  <text x="480" y="388" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">SPACEBAR SPEED</text>
  <g fill="#ffffff" opacity=".88">
    <circle cx="664" cy="136" r="8"/>
    <circle cx="706" cy="102" r="6"/>
    <circle cx="746" cy="154" r="10"/>
  </g>
  <path d="M626 210a88 88 0 1 1 1 0" fill="none" stroke="#00fff5" stroke-width="12" opacity=".85"/>
  <path d="M626 210l54-58" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
</svg>
